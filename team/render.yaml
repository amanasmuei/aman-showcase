services:
  - type: worker
    name: aman-team
    env: node
    buildCommand: echo "ready"
    startCommand: npx @aman_asmuei/achannel serve
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AMAN_AI_NAME
        value: Aman
